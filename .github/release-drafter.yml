# Release notes template and PR autolabeler for release-drafter
# Docs: https://github.com/release-drafter/release-drafter

name-template: '$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: Breaking Changes
    labels: ['breaking']
  - title: Features
    labels: ['feature']
  - title: Bug Fixes
    labels: ['fix']
  - title: Connectors
    labels: ['connector']
  - title: Documentation
    labels: ['docs']
  - title: Other Changes
    labels: ['chore', 'ci', 'refactor', 'test', 'style', 'perf', 'build']

change-template: '- $TITLE (#$NUMBER)'

autolabeler:
  - label: 'feature'
    title: ['/^feat(\(.+\))?!?:/']
  - label: 'fix'
    title: ['/^fix(\(.+\))?!?:/']
  - label: 'connector'
    title: ['/^(feat|fix)\(connector(?:s)?(?:\/.+)?\)!?:/']
  - label: 'docs'
    title: ['/^docs(\(.+\))?!?:/']
  - label: 'ci'
    title: ['/^ci(\(.+\))?!?:/']
  - label: 'build'
    title: ['/^build(\(.+\))?!?:/']
  - label: 'chore'
    title: ['/^chore(\(.+\))?!?:/']
  - label: 'refactor'
    title: ['/^refactor(\(.+\))?!?:/']
  - label: 'test'
    title: ['/^test(\(.+\))?!?:/']
  - label: 'style'
    title: ['/^style(\(.+\))?!?:/']
  - label: 'perf'
    title: ['/^perf(\(.+\))?!?:/']
  - label: 'breaking'
    title: ['/^.+!:/']

# Small, frequent 0.4.x patch releases by default — a `feat:`-titled PR only earns
# the 'feature' label (for changelog grouping), it does NOT bump minor on its own.
# Bumping to a new minor (0.5.0) is a deliberate call: add the 'minor' label to the
# PR by hand when a feature is big enough to warrant it.
version-resolver:
  major:
    labels: ['breaking']
  minor:
    labels: ['minor']
  patch:
    labels: ['feature', 'fix', 'docs', 'chore', 'ci', 'refactor', 'test', 'style', 'perf', 'build', 'connector']
  default: patch

template: |
  ## What's Changed

  $CHANGES
