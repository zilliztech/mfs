# Build and publish the Python package when a version tag is pushed.
#
# Usage:
#   git tag v0.1.0  # must match pyproject.toml
#   git push official v0.1.0
#
# PyPI Trusted Publishing must be configured for:
#   owner/repo: zilliztech/mfs
#   workflow: .github/workflows/release.yml
#   environment: pypi

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Check tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$tag_version" = "$package_version"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
