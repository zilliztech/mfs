# Format checks on push/PR to main.
#
# Two independent jobs so the Rust / Python sides can fail / pass independently
# and we don't pay Python setup time on a Rust-only PR (or vice-versa). Lint
# rules beyond formatting are deliberately not enforced for v0.4.0-beta.1 —
# they'll be tightened before v0.4.0 stable.

name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  version-lockstep:
    name: package version lockstep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify package versions match
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys
          import tomllib

          root = pathlib.Path.cwd()

          def toml_version(path: str) -> str:
              with (root / path).open("rb") as f:
                  return tomllib.load(f)["project" if path.endswith("pyproject.toml") else "package"]["version"]

          def lock_version(path: str, package_name: str) -> str:
              with (root / path).open("rb") as f:
                  data = tomllib.load(f)
              for package in data["package"]:
                  if package["name"] == package_name:
                      return package["version"]
              raise SystemExit(f"{package_name} not found in {path}")

          package_lock = json.loads((root / "sdks/typescript/package-lock.json").read_text())
          versions = {
              "cli/Cargo.toml": toml_version("cli/Cargo.toml"),
              "cli/Cargo.lock": lock_version("cli/Cargo.lock", "mfs-cli"),
              "server/python/pyproject.toml": toml_version("server/python/pyproject.toml"),
              "server/python/uv.lock": lock_version("server/python/uv.lock", "mfs-server"),
              "server-rs/Cargo.toml": toml_version("server-rs/Cargo.toml"),
              "server-rs/Cargo.lock": lock_version("server-rs/Cargo.lock", "mfs-server-rs"),
              "server-rs/pyproject.toml": toml_version("server-rs/pyproject.toml"),
              "sdks/python/pyproject.toml": toml_version("sdks/python/pyproject.toml"),
              "sdks/python/uv.lock": lock_version("sdks/python/uv.lock", "mfs-sdk"),
              "sdks/typescript/package.json": json.loads((root / "sdks/typescript/package.json").read_text())["version"],
              "sdks/typescript/package-lock.json": package_lock["version"],
              "sdks/typescript/package-lock.json packages.\"\"": package_lock["packages"][""]["version"],
          }

          if len(set(versions.values())) == 1:
              print(f"package versions match: {next(iter(versions.values()))}")
              sys.exit(0)

          print("package versions are not in lockstep:")
          for path, version in versions.items():
              print(f"  {path}: {version}")
          sys.exit(1)
          PY

  ruff:
    name: ruff format (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install server dev deps
        working-directory: server/python
        run: uv sync --extra dev

      - name: ruff format --check (server)
        working-directory: server/python
        run: uv run ruff format --check src/ tests/

  rustfmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check (cli)
        working-directory: cli
        run: cargo fmt --all -- --check

      - name: cargo fmt --check (server-rs)
        working-directory: server-rs
        run: cargo fmt --all -- --check
