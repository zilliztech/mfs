site_name: MFS
site_description: "Multi-source File-like Search for agents and developers, powered by Milvus"
site_url: https://zilliztech.github.io/mfs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    scheme: slate
    primary: black
    accent: cyan
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/terminal.css

repo_url: https://github.com/zilliztech/mfs
repo_name: zilliztech/mfs

nav:
  - Overview:
    - Home: index.md
    - Why MFS: why.md
    - Architecture: architecture.md
    - Status and Limits: roadmap.md
  - Get Started:
    - Quickstart: getting-started.md
    - Examples: examples.md
    - Configuration: configuration.md
    - Auth and Secrets: auth-and-secrets.md
    - Providers and Processing: providers.md
    - Deployment: deployment.md
    - Storage and Backup: storage-and-backup.md
    - Troubleshooting: troubleshooting.md
  - User Guide:
    - Search and Browse: search-and-browse.md
    - Jobs and Indexing Progress: jobs.md
    - CLI Reference: cli.md
    - Connectors: connectors.md
    - Connector Configuration Recipes: connector-config-recipes.md
    - Connector Reference: connector-reference.md
    - Skills: skills.md
  - Developer Guide:
    - Content Model: content-model.md
    - Development: development.md
    - Server: server.md
    - HTTP API: api.md
    - SDKs: sdks.md
    - Evaluation: evaluation.md
  - Help:
    - Error Codes: errors.md
    - Glossary: glossary.md
    - FAQ: faq.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
