site_name: MFS
site_description: "Semantic file search CLI for agents and developers, powered by Milvus"
site_url: https://zilliztech.github.io/mfs/

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: cyan
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/terminal.css

repo_url: https://github.com/zilliztech/mfs
repo_name: zilliztech/mfs

nav:
  - Home:
    - Overview: index.md
    - Why MFS: why.md
    - How MFS Compares: comparison.md
    - Design Philosophy: design-philosophy.md
    - Architecture: architecture.md
    - Quickstart: getting-started.md
  - User Guide:
    - Search and Browse: search-and-browse.md
    - Agent Skill: skill.md
    - File Formats: formats.md
    - Configuration: configuration.md
    - Milvus Backends: backends.md
    - Agent Workflows: agent-workflows.md
  - CLI Reference: cli.md
  - Evaluation: https://github.com/zilliztech/mfs/tree/main/evaluation
  - Help:
    - FAQ: faq.md
    - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
