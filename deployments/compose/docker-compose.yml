# MFS Docker Compose.
#
# v0.4 ships the all-in-one server: API + inline task processing in one container,
# SQLite metadata + cache on a mounted volume, Milvus via Lite (default) or Zilliz
# Cloud (set ZILLIZ_URI / ZILLIZ_TOKEN). Single runnable topology today.
#
#   ZILLIZ_URI=https://xxx.zillizcloud.com ZILLIZ_TOKEN=... OPENAI_API_KEY=... \
#     docker compose up --build
#
# The api/worker split + Postgres metadata + MinIO object store is the team /
# client-server target; the Postgres metadata backend is wired (MFS_METADATA_DSN),
# the standalone worker daemon lands post-v0.4. Sketch at the bottom (disabled).
services:
  mfs-server:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    image: mfs-server:0.4.0
    command: ["run", "--bind", "0.0.0.0:8765"]
    environment:
      # omit to use bundled Milvus Lite under /data; set to use Zilliz Cloud
      MFS_MILVUS_URI: ${ZILLIZ_URI:-/data/milvus.db}
      MFS_MILVUS_TOKEN: ${ZILLIZ_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MFS_HOME: /data
      # The API requires a Bearer token. Set MFS_API_TOKEN to a known value
      # so host CLIs can authenticate; if empty the server auto-generates one at
      # /data/server.token (read via: docker compose exec mfs-server cat /data/server.token).
      MFS_API_TOKEN: ${MFS_API_TOKEN:-}
    ports: ["8765:8765"]
    volumes:
      - mfs-data:/data          # SQLite metadata + cache + (Lite) milvus.db — persist!
    healthcheck:
      # send the Bearer token (explicit MFS_API_TOKEN, else the auto-generated server.token)
      test: ["CMD", "python", "-c", "import urllib.request,sys,os; tok=os.environ.get('MFS_API_TOKEN') or (open('/data/server.token').read().strip() if os.path.exists('/data/server.token') else ''); req=urllib.request.Request('http://127.0.0.1:8765/v1/server/info', headers={'Authorization':'Bearer '+tok} if tok else {}); sys.exit(0 if urllib.request.urlopen(req).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mfs-data:

# ---------------------------------------------------------------------------
# Team / CS topology — enable once the Postgres metadata backend
# and standalone worker daemon ship (post-0.4):
#
#   postgres:    image: postgres:16          # metadata  (MFS_METADATA_DSN=postgresql://...)
#   minio:       image: minio/minio          # object store
#   mfs-api:     image: mfs-server:0.4.0      # command: ["api",    "--bind", "0.0.0.0:8765"]
#   mfs-worker:  image: mfs-server:0.4.0      # command: ["worker", "--concurrency", "auto"]
# ---------------------------------------------------------------------------
