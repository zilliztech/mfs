apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels: {{- include "mfs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mfs
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mfs
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: {{ include "mfs.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["api", "--bind", "0.0.0.0:{{ .Values.api.port }}"]
          ports:
            - containerPort: {{ .Values.api.port }}
          env: {{- include "mfs.env" . | nindent 12 }}
          readinessProbe:
            httpGet: { path: /healthz, port: {{ .Values.api.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: {{ .Values.api.port }} }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
  labels: {{- include "mfs.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: mfs
    app.kubernetes.io/component: api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
